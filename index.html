    <style>
        html,
        body {
            height: 100%;
            margin: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;

        /* Увеличение ширины основного контейнера */

        }

        .download-buttons {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin-top: 50px;
            flex-wrap: wrap;
        }

        .download-buttons a {
            padding: 35px 60px;
            min-width: 400px;
            font-size: 1.6rem;
            font-weight: 800;
            text-decoration: none;
            border-radius: 20px;
            position: relative;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
        }

        .primary-button {
            background-color: #4285F4;
            color: #fff !important;
        }

        .secondary-button {
            background-color: #f8f9fa;
            color: #3c4043 !important;
            border: 2px solid #dadce0 !important;
        }

        /* Исправление видимости текста при наведении */

            color: #202124 !important;

        .download-buttons i {
            color: inherit !important;
            margin-right: 20px;
            font-size: 1.8rem;
            background: none !important;
            -webkit-text-fill-color: initial !important;
        }

        .primary-button-glow {
            box-shadow: 0 0 40px rgba(66, 133, 244, 0.9);
            animation: pulse-blue-massive 2s infinite;
        }

        @keyframes pulse-blue-massive {
            0% {
                box-shadow: 0 0 0 0 rgba(66, 133, 244, 0.8), 0 0 30px rgba(66, 133, 244, 0.6);
            }

            70% {
                box-shadow: 0 0 0 35px rgba(66, 133, 244, 0), 0 0 65px rgba(66, 133, 244, 0.8);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(66, 133, 244, 0), 0 0 30px rgba(66, 133, 244, 0.6);
            }
        }

        .primary-button:hover {
            transform: translateY(-8px) scale(1.03);
            box-shadow: 0 0 60px rgba(66, 133, 244, 1);
        }

        #os-info {
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        .cent {
            text-align: center;
        }

        #version-info {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #888;
            opacity: 0.7;
        }
    </style>
</head>

<body>
    <main id="app">
        <nav class="menu menu-simplified">

                <a class="menu-logo" href="/">
                    <span style="margin-left: 10px;">ФЛАУНЧЕР<span class="tree-emoji">🌳</span> ЗАГРУЗКА</span>
                </a>
            </div>
        </nav>

        <div class="content doc">
            <h2 class="cent" style="margin-top: 60px; font-size: 3rem; font-weight: 800; letter-spacing: -1px;">Привет! Давай установим лаунчер!</h2>
            <h2 id="os-info" class="cent" style="font-weight: normal; color: #666;">Определение твоей операционной
                системы...</h2>

            <div id="version-toggle-section" class="version-toggle-container">
                <div class="version-toggle">
                    <input type="radio" id="stable" name="version" value="stable">
                    <label for="stable">Стабильная</label>

                </div>
            </div>

            <div id="download-section" class="download-buttons">
            </div>
            <div id="version-info" class="cent"></div>
            <p class="cent" style="margin-top: 30px; font-size: 0.9rem; color: #888;">
                Осуществляя загрузку, вы выражаете безоговорочное согласие с <a href="disclaimer.html"
                    style="color: inherit; text-decoration: underline;">Отказом от ответственности</a>.
            </p>
        </div>
    </main>

    <footer class="footer" id="footer">
        <div class="footer-left">

            <span>2026</span><br><br>
            CC BY-SA
        </div>
        <div class="footer-right">

                <input checked="checked" id="checkbox" type="checkbox">
                <span class="slider round"></span>
            </label>
        </div>
    </footer>

    <script>
        function isSupportedOS() {
            const userAgent = navigator.userAgent.toLowerCase();
            if (/windows nt (\d+\.\d+)/.test(userAgent)) {
                const version = parseFloat(userAgent.match(/windows nt (\d+\.\d+)/)[1]);
                if (/win32|x86/i.test(userAgent)) return false;
                return version >= 10;
            }
            if (/mac os x (\d+(\.\d+)?)/.test(userAgent)) {
                const version = parseFloat(userAgent.match(/mac os x (\d+(\.\d+)?)/)[1]);
                return version >= 10;
            }
            if (/android/i.test(userAgent)) return false;
            if (/linux/i.test(userAgent)) return true;
            if (/iphone|ipad|ipod/i.test(userAgent)) return false;
            return false;
        }

        let cachedStableLinks = null;
        let cachedLatestLinks = null;

        async function loadDownloadLinks(type = 'latest') {
            if (type === 'stable') {
                if (cachedStableLinks) return cachedStableLinks;
                try {
                    const response = await fetch('downloadLinks.json');
                    cachedStableLinks = await response.json();

                    // Пытаемся извлечь версию из названия файла в ссылке
                    const match = cachedStableLinks.windows.match(/setup-(.*)-(?:x64|arm64|universal|x86_64|amd64|armv7l|ia32)/);
                    if (match) cachedStableLinks.version = match[1];

                    // Пытаемся получить хэш из GitHub для стабильной версии
                    try {
                        const tagMatch = cachedStableLinks.windows.match(/releases\/download\/(.*?)\//);
                        const tagName = tagMatch ? tagMatch[1] : null;

                        if (tagName) {
                            const ghResponse = await fetch(`https://api.github.com/repos/Envel-Experimental/HeliosLauncher/releases/tags/${tagName}`);
                            const stableRel = await ghResponse.json();

                            if (stableRel && stableRel.body) {
                                const hashMatch = stableRel.body.match(/Commit.*?\s+([a-f0-9]{7,40})/i);
                                if (hashMatch) cachedStableLinks.hash = hashMatch[1].substring(0, 7);
                            }
                        }
                    } catch (e) {
                        console.warn('Не удалось загрузить хэш для стабильной версии');
                    }

                    return cachedStableLinks;
                } catch (error) {
                    console.error('Ошибка загрузки стабильной версии:', error);
                    return { windows: "#", mac: "#", linux: "#" };
                }
            } else {
                if (cachedLatestLinks) return cachedLatestLinks;
                try {
                    const response = await fetch('https://api.github.com/repos/Envel-Experimental/HeliosLauncher/releases');
                    const releases = await response.json();
                    // Фильтруем: релизы (не пре-релизы) ИЛИ пре-релизы с "STABLE" в названии
                    const latest = releases.find(r => !r.draft && (!r.prerelease || (r.name && r.name.includes('STABLE'))));
                    if (!latest) throw new Error('Релизы не найдены');

                    const links = {
                        windows: "#",
                        mac: "#",
                        linux: "#",
                        all: latest.html_url,
                        version: "",
                        hash: ""
                    };

                    const hashMatch = latest.body ? latest.body.match(/Commit.*?\s+([a-f0-9]{7,40})/i) : null;
                    if (hashMatch) links.hash = hashMatch[1].substring(0, 7);

                    latest.assets.forEach(asset => {
                        if (asset.name.match(/Flauncher-setup-.*-x64\.exe$/)) {
                            links.windows = asset.browser_download_url;
                        } else if (asset.name.match(/Flauncher-setup-.*-universal\.dmg$/)) {
                            links.mac = asset.browser_download_url;
                        } else if (asset.name.match(/Flauncher-setup-.*-x86_64\.AppImage$/)) {
                            links.linux = asset.browser_download_url;
                        }

                        // Извлекаем версию из первого подходящего ассета
                        if (!links.version) {
                            const vMatch = asset.name.match(/setup-(.*)-(?:x64|arm64|universal|x86_64|amd64|armv7l|ia32)/);
                            if (vMatch) links.version = vMatch[1];
                        }
                    });
                    cachedLatestLinks = links;
                    return links;
                } catch (error) {
                    console.error('Ошибка загрузки новейшей версии:', error);
                    return loadDownloadLinks('stable');
                }
            }
        }

        function detectOS() {
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            if (/win/i.test(userAgent)) {
                return { name: "Windows", linkKey: "windows", icon: "fab fa-microsoft" };
            }
            if (/mac/i.test(userAgent)) {
                return { name: "macOS", linkKey: "mac", icon: "fab fa-apple" };
            }
            if (/linux/i.test(userAgent)) {
                return { name: "Linux", linkKey: "linux", icon: "fab fa-linux" };
            }
            return { name: "неизвестная система", linkKey: null, icon: "fas fa-question" };
        }

        function redirectToHelpPage() {
            setTimeout(function () {
                window.location.href = "help.html";
            }, 2000);
        }

        async function updateDownloadButtons(type) {
            const downloadSection = document.getElementById("download-section");
            const os = detectOS();
            const data = await loadDownloadLinks(type);

            let htmlContent = "";
            if (data && os.linkKey && data[os.linkKey]) {
                htmlContent += `
                    <a href="${data[os.linkKey]}" class="primary-button primary-button-glow" onclick="redirectToHelpPage()">
                        <i class="${os.icon}"></i> 
                        Скачать для ${os.name}
                    </a>
                `;
            }

            htmlContent += `
                <a href="all_list.html" class="secondary-button"><i class="fas fa-list"></i> Другая система</a>
            `;
            downloadSection.innerHTML = htmlContent;

            // Обновляем информацию о версии
            const versionInfo = document.getElementById("version-info");
            if (data.version) {
                const label = type === 'stable' ? "Стабильная версия" : "Новейшая версия";
                let content = `${label} ${data.version}`;
                if (data.hash) content += ` (@${data.hash})`;
                versionInfo.innerHTML = content;
            } else {
                versionInfo.innerHTML = "";
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const osInfoElement = document.getElementById("os-info");
            const os = detectOS();

            if (!isSupportedOS()) {
                osInfoElement.innerHTML = "Ваша система не поддерживается";
                return;
            }

            osInfoElement.innerHTML = `Твоя система: <b>${os.name}</b>`;

            // Загрузка сохраненного выбора или по умолчанию стабильная
            const savedVersion = localStorage.getItem('launcher-version-type') || 'latest';
            const toggleInput = document.getElementById(savedVersion);
            if (toggleInput) toggleInput.checked = true;

            updateDownloadButtons(savedVersion);

            // Обработка переключения
            document.querySelectorAll('input[name="version"]').forEach(input => {
                input.addEventListener('change', (e) => {
                    const versionType = e.target.value;
                    localStorage.setItem('launcher-version-type', versionType);
                    updateDownloadButtons(versionType);
                });
            });
        });
    </script>

    <script src="files/wiki/theme.js"></script>
</body>

</html>
