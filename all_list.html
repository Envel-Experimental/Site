<!DOCTYPE html>
<html lang="ru" theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Скачать лаунчер ФЛАУНЧЕР - Все версии">
    <title>Все загрузки - ФЛАУНЧЕР</title>

    <link
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>"
        rel="icon">
    <link href="files/wiki/style.css" rel="stylesheet">
    <link href="files/wiki/main.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">

    <style>
        body {
            font-size: 16px;
            height: 100%;
            margin: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #fcfcfc;
        }

        [theme="dark"] body {
            background-color: #121212;
            color: #eee;
        }

        .content.doc {
            max-width: 1100px !important;
            width: 95% !important;
            margin: 0 auto;
            padding-bottom: 100px;
        }

        /* Заголовок */
        h2.cent {
            margin-top: 50px;
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -1px;
        }

        /* Переключатель версий */
        .version-toggle-container {
            margin-bottom: 40px;
        }

        /* Селектор платформ (Полоска) */
        .platform-strip {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
            padding: 10px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .platform-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 28px;
            background: #fff;
            border: 2px solid #eee;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 600;
            white-space: nowrap;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
        }

        [theme="dark"] .platform-item {
            background: #1e1e1e;
            border-color: #333;
        }

        .platform-item:hover {
            transform: translateY(-3px);
            border-color: #4285F4;
            box-shadow: 0 10px 20px rgba(66, 133, 244, 0.1);
        }

        .platform-item.active {
            background: #4285F4;
            border-color: #4285F4;
            color: #fff;
            box-shadow: 0 8px 25px rgba(66, 133, 244, 0.3);
        }

        .platform-item i {
            font-size: 1.4rem;
        }

        /* Список ассетов */
        .asset-list {
            background: #fff;
            border-radius: 24px;
            border: 1px solid #eee;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.03);
            animation: fadeIn 0.5s ease;
        }

        [theme="dark"] .asset-list {
            background: #1e1e1e;
            border-color: #333;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .asset-item {
            display: grid;
            grid-template-columns: auto 1fr auto auto;
            align-items: center;
            padding: 20px 30px;
            border-bottom: 1px solid #f5f5f5;
            transition: background 0.2s;
            gap: 20px;
        }

        [theme="dark"] .asset-item {
            border-bottom-color: #2a2a2a;
        }

        .asset-item:last-child {
            border-bottom: none;
        }

        .asset-item:hover {
            background: #fafafa;
        }

        [theme="dark"] .asset-item:hover {
            background: #252525;
        }

        .asset-icon {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f0f4ff;
            color: #4285F4;
            border-radius: 12px;
            font-size: 1.2rem;
        }

        [theme="dark"] .asset-icon {
            background: #2a3a5a;
        }

        .asset-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .asset-name {
            font-weight: 700;
            font-size: 1.1rem;
            color: #222;
            word-break: break-all;
        }

        [theme="dark"] .asset-name {
            color: #fff;
        }

        .asset-meta {
            font-size: 0.85rem;
            color: #888;
            display: flex;
            gap: 15px;
        }

        .asset-size {
            font-weight: 500;
        }

        .asset-actions {
            display: flex;
            gap: 10px;
        }

        .download-btn {
            background: #4285F4;
            color: #fff;
            padding: 12px 28px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 800;
            font-size: 18px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Inter', sans-serif;
        }

        .download-btn:hover {
            background: #3367d6;
            transform: scale(1.05);
        }

        .secondary-btn {
            background: transparent;
            color: #666;
            border: 2px solid #eee;
            padding: 8px 16px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
        }

        [theme="dark"] .secondary-btn {
            border-color: #333;
            color: #aaa;
        }

        .secondary-btn:hover {
            border-color: #ccc;
            color: #333;
        }

        [theme="dark"] .secondary-btn:hover {
            border-color: #555;
            color: #fff;
        }

        /* Информационная панель */
        .release-summary {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(66, 133, 244, 0.05);
            border-radius: 20px;
        }

        #version-display {
            font-weight: 800;
            color: #4285F4;
        }

        .empty-state {
            padding: 60px;
            text-align: center;
            color: #888;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 20px;
            display: block;
            opacity: 0.3;
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .asset-item {
                grid-template-columns: auto 1fr;
                padding: 20px;
            }

            .asset-actions {
                grid-column: span 2;
                margin-top: 10px;
            }

            .platform-strip {
                justify-content: flex-start;
            }
        }
    </style>
</head>

<body>
    <main id="app">
        <nav class="menu menu-simplified">
            <div class="menu-flex-container">
                <a class="menu-logo" href="index.html">
                    <span style="margin-left: 10px;">ФЛАУНЧЕР<span class="tree-emoji">🌳</span> ЗАГРУЗКИ</span>
                </a>
            </div>
            <div class="menu-simplified-right">
                <a class="d-button button-black" href="help.html" style="margin-right: 10px;">Помощь</a>
            </div>
        </nav>

        <div class="content doc">
            <h2 class="cent">Найди свою версию</h2>

            <div id="version-toggle-section" class="version-toggle-container">
                <div class="version-toggle">
                    <input type="radio" id="stable" name="version" value="stable">
                    <label for="stable">Стабильная</label>
                    <input type="radio" id="latest" name="version" value="latest" checked>
                    <label for="latest">Новейшая</label>
                </div>
            </div>

            <div class="release-summary" id="release-info-box" style="display: none;">
                Загрузка ассетов для <span id="version-display">...</span>
            </div>

            <div class="platform-strip" id="platform-picker">
                <div class="platform-item active" data-platform="windows">
                    <i class="fab fa-windows"></i> Windows
                </div>
                <div class="platform-item" data-platform="macos">
                    <i class="fab fa-apple"></i> macOS
                </div>
                <div class="platform-item" data-platform="linux">
                    <i class="fab fa-linux"></i> Linux
                </div>
                <div class="platform-item" data-platform="source">
                    <i class="fas fa-code"></i> Исходники
                </div>
            </div>

            <div class="asset-list" id="asset-container">
                <div class="empty-state">
                    <i class="fas fa-circle-notch fa-spin"></i>
                    Загрузка списка файлов с GitHub...
                </div>
            </div>

            <p class="cent" style="margin-top: 50px; font-size: 0.9rem; color: #888;">
                Осуществляя загрузку, вы выражаете безоговорочное согласие с <a href="disclaimer.html"
                    style="color: inherit; text-decoration: underline;">Отказом от ответственности</a>.
            </p>
        </div>
    </main>

    <footer class="footer" id="footer">
        <div class="footer-left">
            <a href="index.html">f-launcher.ru</a> &nbsp;·&nbsp;
            <a href="disclaimer.html">Отказ от ответственности</a> &nbsp;·&nbsp;
            <a href="help.html">Помощь</a> &nbsp;·&nbsp;
            <span>2026</span>
        </div>
        <div class="footer-right">
            <label class="theme-switcher" for="checkbox">
                <input checked="checked" id="checkbox" type="checkbox">
                <span class="slider round"></span>
            </label>
        </div>
    </footer>

    <script>
        let currentReleaseData = null;
        let currentPlatform = 'windows';

        async function fetchAllReleases(type) {
            const assetContainer = document.getElementById('asset-container');
            const releaseBox = document.getElementById('release-info-box');
            const versionDisplay = document.getElementById('version-display');

            assetContainer.innerHTML = '<div class="empty-state"><i class="fas fa-circle-notch fa-spin"></i> Загрузка...</div>';

            try {
                if (type === 'stable') {
                    // Для стабильной можем брать из downloadLinks.json или искать по тегу
                    const response = await fetch('downloadLinks.json');
                    const links = await response.json();

                    // Пытаемся найти тег в ссылке
                    const tagMatch = links.windows.match(/releases\/download\/(.*?)\//);
                    const tagName = tagMatch ? tagMatch[1] : null;

                    if (tagName) {
                        const ghResponse = await fetch(`https://api.github.com/repos/Envel-Experimental/HeliosLauncher/releases/tags/${tagName}`);
                        currentReleaseData = await ghResponse.json();
                    } else {
                        // Фолбэк если не нашли тег
                        currentReleaseData = { assets: [], tag_name: 'Stable', html_url: '#' };
                    }
                } else {
                    const response = await fetch('https://api.github.com/repos/Envel-Experimental/HeliosLauncher/releases');
                    const releases = await response.json();
                    // Ищем последний не-черновик
                    currentReleaseData = releases.find(r => !r.draft && (!r.prerelease || (r.name && r.name.includes('STABLE')))) || releases[0];
                }

                if (currentReleaseData) {
                    releaseBox.style.display = 'block';

                    let releaseName = currentReleaseData.name || currentReleaseData.tag_name;

                    // Перевод названий релизов
                    if (releaseName.includes('Prerelease build from master STABLE')) {
                        releaseName = 'Плавающий релиз';
                    } else if (releaseName.includes('Release build')) {
                        releaseName = 'Стабильный релиз';
                    } else if (releaseName.includes('Latest build')) {
                        releaseName = 'Последняя сборка';
                    }

                    versionDisplay.textContent = releaseName;
                    renderAssets();
                }
            } catch (error) {
                console.error('Error fetching releases:', error);
                assetContainer.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i> Ошибка загрузки данных</div>';
            }
        }

        function formatSize(bytes) {
            if (!bytes) return 'N/A';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function getFileIcon(name) {
            const ext = name.split('.').pop().toLowerCase();
            if (['exe', 'msi'].includes(ext)) return 'fab fa-windows';
            if (['dmg', 'pkg'].includes(ext)) return 'fab fa-apple';
            if (['deb', 'rpm', 'appimage', 'snap'].includes(ext)) return 'fab fa-linux';
            if (['zip', 'gz', 'tar', '7z'].includes(ext)) return 'fas fa-file-archive';
            if (['yml', 'yaml'].includes(ext)) return 'fas fa-file-code';
            return 'fas fa-file';
        }

        function getAssetDisplayData(name) {
            const n = name.toLowerCase();
            let title = name;
            let desc = "";
            let badge = "";

            // Windows
            if (n.includes('.exe') || n.includes('.msi')) {
                if (n.includes('arm64')) {
                    title = "Windows (ARM64)";
                    desc = "Для современных планшетов и ноутбуков на процессорах ARM";
                    badge = "ARM64";
                } else if (n.includes('x64')) {
                    title = "Windows (64-bit)";
                    desc = "Стандартная версия для большинства ПК";
                    badge = "x64";
                } else if (n.includes('setup') && !n.includes('x64') && !n.includes('arm64')) {
                    title = "Windows (Универсальный)";
                    desc = "Установщик, который сам выберет нужную версию";
                    badge = "Universal";
                } else if (!n.includes('setup')) {
                    title = "Windows (Портативный)";
                    desc = "Работает без установки, просто запустите файл";
                    badge = "Portable";
                }
            }
            // macOS
            else if (n.includes('.dmg') || n.includes('.pkg')) {
                if (n.includes('arm64')) {
                    title = "macOS (Apple Silicon)";
                    desc = "Для Mac с процессорами M1, M2, M3 и новее";
                    badge = "M1/M2/M3";
                } else if (n.includes('x64')) {
                    title = "macOS (Intel)";
                    desc = "Для старых моделей Mac на базе Intel";
                    badge = "Intel";
                } else if (n.includes('universal')) {
                    title = "macOS (Универсальный)";
                    desc = "Работает на любых моделях Mac";
                    badge = "Universal";
                }
            }
            // Linux
            else if (n.includes('.deb')) {
                title = "Linux (Debian/Ubuntu)";
                desc = "Для систем на базе Debian, таких как Ubuntu, Mint, Kali";
                badge = "DEB";
            } else if (n.includes('.rpm')) {
                title = "Linux (Fedora/RedHat)";
                desc = "Для систем на базе RedHat, таких как Fedora, CentOS";
                badge = "RPM";
            } else if (n.includes('.appimage')) {
                title = "Linux (AppImage)";
                desc = "Универсальный формат, работает на большинстве дистрибутивов";
                badge = "AppImage";
            } else if (n.includes('.snap')) {
                title = "Linux (Snap)";
                desc = "Пакет для Snap Store";
                badge = "Snap";
            } else if (n.includes('.tar.gz')) {
                title = "Linux (Архив)";
                desc = "Распакуйте и запустите вручную";
                badge = "Archive";
            }

            return { title, desc, badge };
        }

        function renderAssets() {
            const container = document.getElementById('asset-container');
            if (!currentReleaseData) return;

            let assets = [...currentReleaseData.assets];

            // Добавляем исходники
            if (currentPlatform === 'source') {
                assets = [
                    { name: 'Source code (zip)', browser_download_url: currentReleaseData.zipball_url, isSource: true },
                    { name: 'Source code (tar.gz)', browser_download_url: currentReleaseData.tarball_url, isSource: true }
                ];
            } else {
                // Фильтрация
                assets = assets.filter(asset => {
                    const name = asset.name.toLowerCase();
                    const isTechnical = name.includes('.blockmap') || name.includes('.yml') || name === 'elevate.exe' || name === 'app-update.yml' || name.includes('.yml');

                    if (currentPlatform === 'windows') {
                        return (name.includes('.exe') || name.includes('.msi')) && !isTechnical;
                    }
                    if (currentPlatform === 'macos') {
                        return (name.includes('.dmg') || name.includes('.pkg')) && !isTechnical;
                    }
                    if (currentPlatform === 'linux') {
                        return (name.includes('.deb') || name.includes('.rpm') || name.includes('.appimage') || name.includes('.snap') || name.includes('.tar.gz')) && !isTechnical;
                    }
                    return false;
                });
            }

            // Сортировка по популярности
            assets.sort((a, b) => {
                const nameA = a.name.toLowerCase();
                const nameB = b.name.toLowerCase();

                function getWeight(name) {
                    // Windows
                    if (currentPlatform === 'windows') {
                        if (name.includes('x64')) return 1;
                        if (name.includes('setup') && !name.includes('arm64')) return 2;
                        if (!name.includes('setup')) return 3; // Portable
                        if (name.includes('arm64')) return 4;
                    }
                    // macOS
                    if (currentPlatform === 'macos') {
                        if (name.includes('arm64')) return 1;
                        if (name.includes('universal')) return 2;
                        if (name.includes('x64')) return 3;
                    }
                    // Linux
                    if (currentPlatform === 'linux') {
                        if (name.includes('.appimage')) return 1;
                        if (name.includes('.deb')) return 2;
                        if (name.includes('.rpm')) return 3;
                        if (name.includes('.snap')) return 4;
                        if (name.includes('.tar.gz')) return 5;
                    }
                    return 99;
                }

                return getWeight(nameA) - getWeight(nameB);
            });

            if (assets.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-folder-open"></i> Файлы не найдены для этой платформы</div>';
                return;
            }

            container.innerHTML = assets.map(asset => {
                const display = getAssetDisplayData(asset.name);
                return `
                    <div class="asset-item">
                        <div class="asset-icon">
                            <i class="${getFileIcon(asset.name)}"></i>
                        </div>
                        <div class="asset-info">
                            <div class="asset-name">
                                ${display.title}
                                ${display.badge ? `<span style="font-size: 0.7rem; background: rgba(66, 133, 244, 0.1); color: #4285F4; padding: 2px 8px; border-radius: 6px; margin-left: 8px; vertical-align: middle;">${display.badge}</span>` : ''}
                            </div>
                            <div style="font-size: 0.9rem; color: #666; margin-bottom: 5px;">${display.desc || asset.name}</div>
                            <div class="asset-meta">
                                ${asset.size ? `<span class="asset-size"><i class="fas fa-hdd"></i> ${formatSize(asset.size)}</span>` : ''}
                                ${asset.download_count !== undefined ? `<span><i class="fas fa-download"></i> ${asset.download_count}</span>` : ''}
                            </div>
                        </div>
                        <div class="asset-actions">
                            <a href="${asset.browser_download_url}" class="download-btn">
                                <i class="fas fa-cloud-download-alt"></i> Скачать
                            </a>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Event Listeners
        document.getElementById('platform-picker').addEventListener('click', (e) => {
            const item = e.target.closest('.platform-item');
            if (!item) return;

            document.querySelectorAll('.platform-item').forEach(p => p.classList.remove('active'));
            item.classList.add('active');

            currentPlatform = item.dataset.platform;
            renderAssets();
        });

        document.querySelectorAll('input[name="version"]').forEach(input => {
            input.addEventListener('change', (e) => {
                const versionType = e.target.value;
                localStorage.setItem('launcher-version-type', versionType);
                fetchAllReleases(versionType);
            });
        });

        document.addEventListener('DOMContentLoaded', () => {
            const savedVersion = localStorage.getItem('launcher-version-type') || 'latest';
            const toggleInput = document.getElementById(savedVersion);
            if (toggleInput) toggleInput.checked = true;

            fetchAllReleases(savedVersion);
        });
    </script>

    <script src="files/wiki/theme.js"></script>
</body>

</html>
