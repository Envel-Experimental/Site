<!DOCTYPE html>
<html lang="ru" theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Скачать лаунчер ФЛАУНЧЕР">
    <title>Скачать лаунчер - ФЛАУНЧЕР</title>

    <link
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>"
        rel="icon">
    <link href="files/wiki/style.css" rel="stylesheet">

    <style>
        body {
            font-size: 18px;
            height: 100%;
            margin: 0;
            font-family: sans-serif;
        }

        .content.doc {
            max-width: 1250px !important;
            width: 95% !important;
            margin: 0 auto;
        }

        .download-buttons {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .download-buttons a {
            padding: 35px 60px;
            min-width: 400px;
            font-size: 1.6rem;
            font-weight: 800;
            text-decoration: none;
            border-radius: 20px;
            position: relative;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
        }

        .primary-button {
            background-color: #4285F4;
            color: #fff !important;
        }

        .secondary-button {
            background-color: #f8f9fa;
            color: #3c4043 !important;
            border: 2px solid #dadce0 !important;
        }

        .secondary-button:hover {
            background-color: #e8eaed !important;
            color: #202124 !important;
            border-color: #bdc1c6 !important;
            transform: translateY(-5px);
        }

        .download-buttons i {
            color: inherit !important;
            margin-right: 20px;
            font-size: 1.8rem;
            background: none !important;
            -webkit-text-fill-color: initial !important;
        }

        .primary-button-glow {
            box-shadow: 0 0 25px rgba(66, 133, 244, 0.5);
        }

        .primary-button:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 15px 40px rgba(66, 133, 244, 0.6);
        }

        .cent {
            text-align: center;
        }

        h2.cent:first-child {
            margin-top: 60px;
            font-size: 3rem;
        }

        #os-info {
            font-weight: normal;
            color: #666;
            font-size: 1.5rem;
            margin-bottom: 40px;
        }
    </style>
</head>

<body>
    <main id="app">
        <nav class="menu menu-simplified">
            <div class="menu-flex-container">
                <a class="menu-logo" href="all_list.html">
                    <span style="margin-left: 10px;">ФЛАУНЧЕР<span class="tree-emoji">🌳</span> ЗАГРУЗКА. РУЧНОЙ
                        ВЫБОР</span>
                </a>
            </div>
            <div class="menu-simplified-right">
                <a class="d-button button-black" href="help.html">Помощь</a>
            </div>
        </nav>

        <div class="content doc">
            <h2 class="cent" style="margin-top: 30px;">Привет! Давай установим лаунчер!</h2>
            <h2 id="os-info" class="cent">Выбери свою операционную систему и скачай лаунчер</h2>

            <div id="version-toggle-section" class="version-toggle-container">
                <div class="version-toggle">
                    <input type="radio" id="stable" name="version" value="stable" checked>
                    <label for="stable">Стабильная</label>
                    <input type="radio" id="latest" name="version" value="latest">
                    <label for="latest">Новейшая</label>
                </div>
            </div>

            <div id="download-section" class="download-buttons">
            </div>

            <div class="download-buttons" style="margin-top: 50px;">
                <a href="all.html" class="secondary-button">
                    <i class="fas fa-plus-circle"></i> Открыть ещё варианты
                </a>
            </div>
            <p class="cent" style="margin-top: 40px; font-size: 0.9rem; color: #888;">
                Осуществляя загрузку, вы выражаете безоговорочное согласие с <a href="disclaimer.html"
                    style="color: inherit; text-decoration: underline;">Отказом от ответственности</a>.
            </p>
        </div>

    </main>

    <footer class="footer" id="footer">
        <div class="footer-left">
            <a href="index.html">f-launcher.ru</a> &nbsp;·&nbsp;
            <a href="disclaimer.html">Отказ от ответственности</a> &nbsp;·&nbsp;
            <span>2026</span><br><br>
            CC BY-SA
        </div>
        <div class="footer-right">
            <label class="theme-switcher" for="checkbox">
                <input checked="checked" id="checkbox" type="checkbox">
                <span class="slider round"></span>
            </label>
        </div>
    </footer>

    <script>
        function redirectToHelpPage() {
            setTimeout(function () {
                window.location.href = "help.html";
            }, 2000);
        }

        let cachedStableLinks = null;
        let cachedLatestLinks = null;

        async function loadDownloadLinks(type = 'stable') {
            if (type === 'stable') {
                if (cachedStableLinks) return cachedStableLinks;
                try {
                    const response = await fetch('downloadLinks.json');
                    cachedStableLinks = await response.json();
                    return cachedStableLinks;
                } catch (error) {
                    console.error('Ошибка загрузки стабильной версии:', error);
                    return { windows: "#", mac: "#", linux: "#" };
                }
            } else {
                if (cachedLatestLinks) return cachedLatestLinks;
                try {
                    const response = await fetch('https://api.github.com/repos/Envel-Experimental/HeliosLauncher/releases');
                    const releases = await response.json();
                    const latest = releases.find(r => !r.prerelease && !r.draft);
                    if (!latest) throw new Error('Релизы не найдены');

                    const links = {
                        windows: "#",
                        mac: "#",
                        linux: "#",
                        all: latest.html_url
                    };

                    latest.assets.forEach(asset => {
                        if (asset.name.match(/Flauncher-setup-.*-x64\.exe$/)) {
                            links.windows = asset.browser_download_url;
                        } else if (asset.name.match(/Flauncher-setup-.*-universal\.dmg$/)) {
                            links.mac = asset.browser_download_url;
                        } else if (asset.name.match(/Flauncher-setup-.*-x86_64\.AppImage$/)) {
                            links.linux = asset.browser_download_url;
                        }
                    });
                    cachedLatestLinks = links;
                    return links;
                } catch (error) {
                    console.error('Ошибка загрузки новейшей версии:', error);
                    return loadDownloadLinks('stable');
                }
            }
        }

        async function updateDownloadButtons(type) {
            const downloadSection = document.getElementById("download-section");
            const data = await loadDownloadLinks(type);

            const windowsButton = `
                <a href="${data.windows}" class="primary-button primary-button-glow" onclick="redirectToHelpPage()">
                    <i class="fab fa-microsoft"></i> Windows
                </a>
            `;
            const macButton = `
                <a href="${data.mac}" class="primary-button primary-button-glow" onclick="redirectToHelpPage()">
                    <i class="fab fa-apple"></i> macOS
                </a>
            `;
            const linuxButton = `
                <a href="${data.linux}" class="primary-button primary-button-glow" onclick="redirectToHelpPage()">
                    <i class="fab fa-linux"></i> Linux
                </a>
            `;

            downloadSection.innerHTML = windowsButton + macButton + linuxButton;

            // Обновляем ссылку "Открыть ещё варианты" если она должна вести на релиз
            const allVariantsLink = document.querySelector('a[href^="all.html"], a[href^="https://github.com/"]');
            if (allVariantsLink) {
                if (type === 'latest' && data.all) {
                    allVariantsLink.href = data.all;
                } else {
                    allVariantsLink.href = "all.html";
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Загрузка сохраненного выбора или по умолчанию стабильная
            const savedVersion = localStorage.getItem('launcher-version-type') || 'stable';
            const toggleInput = document.getElementById(savedVersion);
            if (toggleInput) toggleInput.checked = true;

            updateDownloadButtons(savedVersion);

            // Обработка переключения
            document.querySelectorAll('input[name="version"]').forEach(input => {
                input.addEventListener('change', (e) => {
                    const versionType = e.target.value;
                    localStorage.setItem('launcher-version-type', versionType);
                    updateDownloadButtons(versionType);
                });
            });
        });
    </script>

    <script src="files/wiki/theme.js"></script>
</body>

</html>
